name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build Next.js static export
        run: npx next build
        env:
          NEXT_OUTPUT: export
        continue-on-error: true

      - name: 📁 Ensure out/ directory exists
        run: |
          if [ ! -d "out" ]; then
            mkdir -p out
            echo '<html><body><h1>DeepSeek App Studio</h1><p>Loading...</p></body></html>' > out/index.html
          fi

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: ☕ Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip -d $HOME
          echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

      - name: 🔨 Create Android WebView App (loads Vercel URL)
        run: |
          mkdir -p android-app/app/src/main/java/com/deepseekstudio/app
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/gradle/wrapper

          # AndroidManifest.xml
          cat > android-app/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.deepseekstudio.app">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <application
                  android:allowBackup="true"
                  android:label="DeepSeek Studio"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize|locale|uiMode"
                      android:screenOrientation="landscape"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          # MainActivity.java — Vercel URL yükle
          cat > android-app/app/src/main/java/com/deepseekstudio/app/MainActivity.java << 'JAVA'
          package com.deepseekstudio.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.view.Window;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                                       WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setSupportZoom(false);
                  settings.setBuiltInZoomControls(false);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://deepseek-app-studio.vercel.app");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA

          # build.gradle (app)
          cat > android-app/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.deepseekstudio.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.deepseekstudio.app"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
          }
          GRADLE

          # build.gradle (project) — settings plugin
          cat > android-app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          GRADLE

          # settings.gradle
          cat > android-app/settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DeepSeekStudio"
          include ':app'
          GRADLE

          # gradle.properties
          cat > android-app/gradle.properties << 'PROP'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROP

          # local.properties
          echo "sdk.dir=$ANDROID_HOME" > android-app/local.properties

          # strings.xml
          cat > android-app/app/src/main/res/values/strings.xml << 'XML'
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">DeepSeek Studio</string>
          </resources>
          XML

          # styles.xml
          cat > android-app/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
              </style>
          </resources>
          XML

          # Gradle wrapper
          cat > android-app/gradle/wrapper/gradle-wrapper.properties << 'PROP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROP

      - name: 🔨 Build APK with Gradle
        working-directory: android-app
        run: |
          $HOME/gradle-8.2/bin/gradle wrapper --gradle-version 8.2 --distribution-type bin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload APK to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-app-studio-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📦 Copy APK to download folder
        run: |
          mkdir -p download
          cp android-app/app/build/outputs/apk/debug/app-debug.apk download/deepseek-app-studio.apk

      - name: 📤 Commit APK to repo (for direct download)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add download/deepseek-app-studio.apk -f
          git commit -m "📱 APK build: $(date +%Y-%m-%d_%H-%M)" || echo "No changes"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mehmetdem2005/Yaz-l-m-projesi.git
          git push || echo "Push failed"

      - name: 📦 Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DeepSeek App Studio v1.0.${{ github.run_number }}"
          body: |
            ## 📱 APK Build #${{ github.run_number }}

            **İndirme:** `deepseek-app-studio.apk` dosyasına tıkla

            ### Kurulum
            1. APK'yı indir
            2. Telefonda "Bilinmeyen kaynaklar" izni ver
            3. APK'yı yükle
            4. Uygulama açılınca Vercel URL yüklenir

            ### Özellikler
            - Sadece yatay mod (landscape)
            - WebView: https://deepseek-app-studio.vercel.app
            - Android 6.0+ uyumlu
          files: download/deepseek-app-studio.apk
          draft: false
          prerelease: false
